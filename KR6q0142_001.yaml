body:
  text: 金粟寺住持通容授弟子行元述總引百丈清規統住持兩序各衆而言也茲獨舉兩序者何以清規為兩序提攝大綱而立身行事之曲折細微中間有未盡備也蓋兩序之設為衆辦事而交相肘臂互作屏藩以黼黻宗猷於可大可久至若司帑庾歷庶務世出世間靡不間習則後日者據位稱師臨衆馭物亦必知繇來所恪守不易之規可以仍舊習之而明其有本所謂成己或人職此之故識是意者雖東西易位不以班次崇卑為嫌進退隨時不以職分得失為計各理其業各安其居上無厭心下無異議雍雍乎古儒歎以為三代威儀僅見於此者良有取爾也逮今隆替相承人情懈變或執意自矜或茫然忽略或強弱異勢黨與攻爭或口舌是非終年失睦非惟有玷法席抑且無補毗尼用是托其大綱詳其細事彚成條欵目曰須知知我罪我我亦何辭焉西序據住持上堂時列次為西序凡任兩序職者宜將本寮龜鑑時常經目公勤行持共鼎法席若也弛墮不以為事則規繩不振誤敗叢林其過非淺幸加簡閲勿致失事也至囑首座須知西堂通用夫禪林之有首座亦猶衣之有領網之有綱也綱領專而佛祖根源人天眼目僧輩表儀悉係焉是故當其職者貴乎尊主愛衆以荷持大法為己任倘或去就乖張三業不謹則內外失瞻將何光前翼後哉因立數條端為本寮龜鑑庶繼起有人亦得依而行之而無虞敗事云住持有命代為行事者宜慎重不辜所舉住持所囑大小事務行之果否當回覆凡事遵守條章毋恃職以縱意凡事斟酌得宜然後行之所言不可妄發所行必顧所言者尊卑有序謙己下人毋恃職大生我慢處事公平度量寬廣毋偏頗淺狹自輕其身各寮執事巨細相通不得別戶分門妄生彼此堂內維那書記等須體諒相尊同心協力為貴毋恃職藏私以致大小不平者堂衆有犯堂規者維那舉出宜隨輕重據理諒情罰之舉罰堂衆維那先已會請議定毋臨時變執互相亢凌堂外各寮行衆有犯清規者知客舉出亦隨輕重據理諒情罰之凡事有牽纏結角不得分斷合宜者當到知客寮會衆頭首商議定奪之請住持上堂小參各項事務照依常例早晚課誦勿失並二時齊粥赴堂除有事別論三板止靜宜隨衆坐香除有事普請宜隨衆除有事護惜常住什物毋故輕支濫費除定例該應者不可私收徒衆濫授法名倘有真心歸向者許議稟方丈老病亡歿垂恤送終等事皆當與會議行之本寮所有常住物件宜置簿登記以便查考告假起單日將本寮常住物件憑簿簡點分明交與知客照管毋致混亂已上數條當職者各宜臨事覺察攙先行之毋待方丈口囑可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立書記須知古之名宿以專柄大法為己任而翰墨詞章則特請書記以職之固知書記之職係匪輕也如黃龍之在泐潭大慧之在昭覺此其最顯著者也迄今佛法不興世風非古縱有其名聊存故事焉耳因立數條端為本寮龜鑑庶後來紹職者亦得勵而行之而無輕所學云住持奉徵召所有進謝表章當代理此古昔盛事也今雖不及見宜存之住持聯啓書柬回復顧問慶吊等當代理稿成即呈覆如住持有餘力則不預其事記録上堂小參開室普說法語等如方丈闕書狀侍者當代理山門榜牒齊疏往來帖式及祈禱水旱蝗災祭文詞語悉屬之抄寫宜用心以清楷為貴毋潦草趂快了事文房四寶尺寸出乎常住宜護惜之毋濫用凡方丈所囑大小事務行之果否當回覆各寮執事巨細相通不得別戶分門妄生彼此處衆貴寬和不得恃職亢上凌下不得大小諸寮干涉餘事除公務告請會議者早晚隨衆課誦并二時齊粥赴堂除有事別論三板止靜宜隨衆坐香除有事普請宜隨衆除有事本寮所有常住文書什物宜私自登簿以便查考退職日將本寮常住文書什物照簿簡點分明交與新書記掌管毋得混亂已上數條當職者各宜臨事覺察依分行之可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立藏主須知經藏輝煌佛祖命脉所寄也司其柄者貴乎勤謹小心以護持聖教為念若夫几案不嚴喧煩不息則非藏主待衆之道矣因立數條端為本寮龜鑑庶後來任職者亦得依而行之而無委故事云藏內所有經典宜敬重藏內經典宜照字號次第安放以便尋覽藏內經典函帙若干安放某處宜置總簿記定以便查閲藏內經典濕潤蠧壞須照顧晒焙及時或黴天或六月是也又晒焙事煩另請衆幫為得藏內所有經典函帙目録常加點對有殘斷缺失者須粘綴增補之藏內經典衆有請出披閲者宜然名登簿及閲畢送還仍照簿交收入藏毋致散失職掌藏內經典亦宜用心博稽廣其聞見毋徒目為故事經藏鎖鑰須嚴謹潔淨藏堂及嚴拭几案等凡方丈所囑大小事務行之果否當回覆處衆貴寬和不得恃職亢上凌下各寮執事巨細相通不得別戶分門妄生彼此不得大小諸寮干涉餘事除公務告請會議者本寮所有常住物件宜私自登簿以便查考退職日將本寮常住物件并藏內經典函帙照號對簿簡點分明交與新藏主掌管毋混亂已上數條當職者各宜臨事覺察攙先行之可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立知客須知知客為叢林綱紐外護耳目自非達才能幹正直服衆者未易以克當如雪竇之在太陽禪月之在石霜是也若夫憎貧敬富重俗輕僧知客之道安在乎因立數條端為本寮龜鑑庶後來荷職者亦得依而行之而無虞敗事云在任官員到山其往來迎送之禮先要同監寺稟白方丈議妥然後行之在任官員到山先要同監寺庫司商量打點齊饌若干湯粿果品若干稟白方丈然後行之其官房床帳器具香燭柴炭等項須當留心照顧至齊時湯饌食物簡點如儀外有隨行皂快等仍各安下去處齊茶欵待毋致踈失如官員在道者特令齊茶相陪禮當隨時別議宰官檀越尊宿到山先要遣知隨潔淨寮房打點床帳器用燈油等項伺候供給至到時茶湯迎待如欲謁方丈預先通報然後引上相見或欲到首座庫司諸寮相訪及各處隨喜者親為引往宰官檀越尊宿詣方丈先令知隨打點坐椅行茶次第如儀不得參差失禮宰官檀越尊宿等凡小食齊飯早晚茶湯應及時照管檀越宰官居士到山或遇朔望之辰俟大衆課誦巡寮畢須令知隨請諸頭首齊到客堂相看方不失叢林大體或尊客寅早未及隨衆者宜黎明為便其次僧俗客情到山齊茶照如常例如欲詣方丈諸寮及參堂安單等亦當引往或有令知隨安單者但觀事勢勿拘尼師女客到山須安置女客堂毋得混雜尊客到山監寺亦得陪隨照管應知之凡有要緊客情到山合用佳品菜蔬者宜囑庫司典座備辦施主設齊請上堂當先引上方丈相見禮畢然後引入庫房打點齊儀上堂儀及請衆頭首儀畢隨令行者捧盤跟隨引齊主到禪堂各寮送禮白云某齊主為某事請和尚某日上堂送畢復令行者上方丈安排禮儀齊主秉香伺候同衆頭首懇請及次日再三詣方丈禮亦如之或執事禮儀庫司忙不及辦先引齊主禮請然後自己分送亦得又齊主未見方丈隨即打點齊儀啓請者但觀事勢勿拘施主設齊佛前上供先入堂白維那後引齊主秉香伺候次第如儀不得少失如有普供鳴鼓三下齊衆齊時須領齊主秉香方丈詣請及住持出坐定諸頭首禮畢又令齊主向住持舉香三拜仍禮東西兩序大衆者或齊主䖍心齊中䞋儀要親遞過當令知隨捧盤伺候不然照如常例又齊畢引齊主方丈拜送宜知之不必拘可也施主設齊散䞋如事忙宜通副寺代理又散䞋有平等雙分不一者隨時酌量施主到山設齊須計其來資厚薄預白副寺隨量營為不得拘泥或往來客僧求謁方丈不具禮物者當引見毋怏怏留難以乖大體凡方丈所囑大小事務行之果否當回覆住持請尊客茶及客堂相看等須及時照管毋致失瞻常住齊茶宜同監寺拜請方丈監寺闕職及有事別出等如田莊稅契出入送迎慶吊差撥各處要緊事務當會議庫司共代理之每夜至開小靜後到庫房同監院直歲營辦議行明日之事凡新僉頭首者當引禮拜方丈參堂巡寮後請茶頭首執事及公幹告假出山日前當白庫司設齊茶小食相待至明晨起身齊飯如儀外合小菜茶果路中備用者應看何事隨時置辦凡往來客情及在寺大小執事有功常住者告假出山合行贐送之禮須議稟方丈常住犒勞頭首令知隨各處具請同庫子安排食物管待春冬二期解制預請化主須同監院商確稟白方丈歲例分飯齊應及時料理并請定明年收飯者堂內各寮大衆告假出山者當詳問為何事考其往返以便裁酌去留在寺及新到僧衆有懇求進堂者預先引拜方丈給出單票然後送入白維那安單堂外各寮行衆有不耐煩告退者當為勸勉安慰發其道心至不可則別僉補之堂外各寮行衆應照名上水牌以便擺撥替換堂外各寮雜小執事有闕職者當請衆補入堂外各寮行衆有非為動衆理合擯出者當議稟方丈各寮行衆有口舌是非者當為據理勸解毋致多事各寮行衆服勞疾病者朝暮饑渴寒溫宜顧問各寮執事巨細相通不得別戶分門妄生彼此不得專學己業廢弛公事互相推託致同寮不平者處衆貴寬和不得恃職亢上凌下或有衆干犯於我者當念彼之辛劬毋得懷忿藏私必革其單而後已訓誨知隨不必妄加鞭捶及惡言毒語等宜體悉善調毋恃職欺凌以致輕心告退客廳寮房令知隨每晨淨掃毋縱懶惰客寮床帳被席器用等應照管預防損壞有不如法者令知隨及時洗晒處置得宜如四月當𠬧晒絮綿洗淨夾被修補客帳晒淨草席秋末冬初則晒乾草苫洗淨夾被收貯絮綿之類是也客寮床帳被席器用等應照件登簿以便查考客房所有物件令知隨收拾安置毋致失落客房所有被物等件凡內外大小諸寮借用者當認名登簿時常管察以便收取毋致遺落客房大小物件缺缺者預白庫司置辦以存後用船隻出入須照顧請人撑搖及打點米果無失無事不可濫費常住茶果及菜蔬等遇亡僧領喪主到方丈請住持秉炬佛事次至禪堂請維那諸師念誦候茶毗畢仍引喪主到方丈禪堂禮謝退職日將客寮所有物件照簿簡點分明交與新知客掌管毋得混亂已上數條當職者各宜臨事覺察攙先行之毋待方丈頻為口囑可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立浴主須知內圊頭附不憚辛勤寒暑而遍叩諸檀施之家無非為堅一其志以淨衆耳故一盥一濯方便靡窮即受福亦莫大焉若失諸緣弗具湯水失宜日用之中幾何能免衆念哉因立數條端為本寮龜鑑庶後來領職者亦得依而行之而共成勝事云起期進堂齊及散期出堂年節齊并普茶宜隨分置辦期內大衆合用布巾草紙履屐器用雜物等宜置辦期內佛前各處香油燈籠等宜置辦起期合用服飾茶果送方丈及頭首等宜置辦自前段至此所應起期致辦者另有開張數目多以百計少以十計須隨量營為可也浴期五日一遍以逢五逢十為限如明日朔望則十四念九日設浴又遇普請或暑天時宜燒浴但非逢期不用請也逢期先掛開浴牌午後排設香桌及湯熱時燃香三炷請住持入浴另打點茶果伺候住持浴畢入堂請浴隨到諸頭首寮處頭首浴畢當通知客請檀越居士浴然後行籌內外照班入浴復敲梆催趲次第亦然凡衆浴畢或點糖湯隨宜管待凡遇浴期先要爭洗浴塘取水及午後請浴時排設香几衣架面盆布巾草履木套耳𭺗腳剪等以供衆用大衆浴畢須洗淨盆塘晒㫰布巾收拾雜物等浴期逢冬宜安設焙爐以便烘暖衣服湯水要充足冷暖得宜或遇夜有要緊客情索一浴者雖非期限亦宜應之早晚路燈及時照管并謹慎火燭柴灰等早晚潔掃糞池挑滌淨器備辦紙籌預供衆用期內所有供衆等物毋自己濫用本寮所有常住什物宜私自登簿以便查考處衆貴寬和不得恃職亢上凌下職滿日所有供衆食物并油燭等宜送入常住職滿日將本寮所有常住什物及供衆零碎等項簡點分明交與圊頭照管毋致混亂已上數條當職者各宜臨事覺察量力行之可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立方丈侍者須知侍者之稱侍住持以近道也清規所列有五曰燒香曰書狀曰請客曰衣鉢曰湯藥頰輔最近肘掖尤親猶身之有臂頭之有項先輩多任叢林幹練謹恪之士為之其為住持蒞衆攸關故也儻制行不勤立身不端非惟有負道法抑亦無裨倚任因立數條端為本寮龜鑑庶繼起近事者亦得遵而行之而無覆餗云耳燒香凡住持上堂小參普說開室時預備香几爐爇無失乃至念誦放參節臘特為諸山名勝尊宿掛搭行禮焚香亦如之朔望住持禮佛具帶小盒香片隨行伺候拈舉時常拭淨匙爐片截檀束或揩拂杖屨晒薰被席並床帳座榻諸餘之屬宜淨掃無怠書狀凡住侍上堂小參開室普說法語并書問酬答偈贊等逐一記録或代製文字往復簡札先具稿呈覆端的然後行事如書記偶缺山門一應文翰悉當代理請客凡住持應接往來賓客諸山尊宿至管待當道檀越或請主專使等須預令客司備茶湯或小食陪飯隨時豐儉及留請兩序茶湯相欵亦宜預備若上堂小參普說夏冬二制諸期內朔望五日一參等或齊主或頭首執事請迎當先覆住持勿致臨時造次不壯叢林巨典又檀越尊客初到山謁方丈畢集會衆頭首執事客廳相看數至者不論遇朔望清旦雲集竟若有檀越尊客在山宜通知客相看亦然或維那知客俱不赴衆或在假其一切行事已上三侍者皆當攝之或云書狀不當干涉餘事無據若住持久出則歸衆行立暫出則俱不離班位衣鉢不立班次兼通內外庶務翼贊住持納忠救過和衆調事其有執事去住人衆辛勞時宜商覆存恤若有寸長片善合圍拱把之才不特先容而已須安置得宜俾玉成有日如密菴以如侍者而得松源東叟得升首座是也乃至整潔巾瓶修頓衣鉢早暮近侍小心左右毋懶略忽怠以致住持動念湯藥朝夕供奉方丈湯藥製揀方料簡慎品味其中根性優劣補瀉不同或湯或丸火候緩急因時調服一一須知謹察若和適飲食酸冷甘鹹寒暑節侯溫扇剃浴等類宜隨時加審毋致違和逮至起居應接勿得差遲須擇年壯謹願者充之或佐助衣鉢侍者撫恤近事行者或暫缺燒香請客悉當攝行立班與燒香書狀請客同其外聖僧侍者在衆後行道不在此限侍者之職內近住持外臨大衆須以佛祖為心肅雍上下期法道底于大成山門因而綦隆或矜伐自居不以平等處人則修持之事勿論贊助之功何有且晨昏在側舉心動念皆所領會如其有命須用心體貼大小曲折靡不周悉臨機圓融相時通變總要不違住持之意不牾大衆之心而已同事諸職尤宜和睦互相肘臂勿以久侍後進而生輕慢其數條外更有欵細不及詳舉各宜覺察行之毋待住持諄諄可也惟當職者照諒之此諭某年某月某日本山住持某立東序據住持上堂時列次為東序監寺須知梵語摩摩帝此云寺主又云知事也知事之職貴以尊主愛衆為念故古昔叢林盛時多請首座西堂書記以充此職其或臘高事諳廉能公謹衆所素服者充之因立數條端為本寮龜鑑庶後來當職者亦得依而行之而無虞敗事云在任官員到山其往來迎送之禮先要同知客稟白方丈議妥然後行之在任官員到山先要同庫司知客商量打點齊饌若干湯粿果品若干稟白方丈然後行事其官房床帳器用香燭柴炭及到時湯饌食物等亦須同知客留心照顧毋得忽略或官員在道者特令齊茶相陪禮當隨時別議本處檀越施主宰官居士到山應加溫存早晚陪論或欲詣諸寮及四處觀瞻者皆得引往本處檀越施主等合行慶吊人事者當會議稟白方丈本處檀越施主等所當周旋敬重者凡遇年節及閒暇時宜親造其家殷勤顧問本處及諸方名僧尊宿到山早晚亦須客房照管本處女客到山宿食語言應加照顧但不得親厚掌理家事常到庫司會計錢穀出入簿書預令歲計有餘毋致臨時空乏歲例分飯齊應及時料理并請定明年收飯者春冬二期解制預請化主須同知客商確稟白方丈常住缺缺物件宜與副寺商議發銀置辦如柴草鹽油豆麻禾麥等可以隨緣募入者當及時會議撥衆理之為得又正四月間雨水淋漓及冬天霜雪嚴寒時預先分付務衆備積柴薪以充後用各寮帳席被綿等有破損者當照管請人收葺凡常住財物雖毫末錙銖十方衆僧有分如非寺門外護官員檀越賓客迎送慶吊合行人事者並不可假名支破侵漁凡事有關係者必會議稟方丈才行不可妄擅己意凡方丈所囑大小事務行之果否當回覆出入寺院須稟白方丈及庫司知客恐臨時有事以便代理差設莊庫職務必須公平毋用私黨致怨上下訓誨行者不妄鞭捶設當懲戒擯罰亦須稟議量情示警毋縱威暴激其諍端擾亂叢席各寮行衆有口舌鬬諍者當為據理勸解毋致多事田園二房等寮須時常往彼慰諭令各安心長遠倘有不如法及亟起單者亦當調度之毋致動念他往各寮行衆有不耐煩告退者當為勸勉安慰發其道心至不得已則從之任知客撥衆代補處衆要寬和不得恃職亢上凌下各寮執事巨細相通不得別戶分門妄生彼此凡服勞疾病者朝暮饑渴寒溫應加照顧行衆有輕心肆罵者當會議處置不得私自革退不可私收徒衆濫授法名倘有真心皈依者當會議知客稟白方丈早暮勤事香火課誦勿失并二時齊粥赴堂除有事別論普請宜隨衆除有事凡遇年節及期內朔望無施主設齊請住持上堂預先日前下午俟禪堂開小靜後衣具秉香同衆頭首方丈拜請次早再三請亦如之除有事別出則庫司代職朔望之辰大衆雲集舉讚當出位佛前上香展具三拜至維那祝白亦出位展具三拜復至韋䭾四處禮亦如之除有事別出則庫司代職凡遇常住齊供時當佛前舉香展拜除有事庫司代職凡遇常住齊茶當與知客拜請住持除有事庫司代職每夜開小靜後到庫房同知客直歲營辦議行明日之事常住所有田莊山界苗租書契等須收拾安放庫房隨時照管田園播植收種宜及時催趲司田園者本寮所有常住什物宜私自登簿以便查考退職日將本寮所有什物并各項書契等照簿簡點分明交與新監寺掌管毋得溷亂已上數條當職者各宜臨事覺察攙先行之毋待方丈頻為口囑可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立維那須知維者綱維華言也那者梵語此云悅衆也又聲論以次第翻之謂能知僧事次第也是故膺其任者必恪守繇來已然之規而衆乃可不紊若夫圖安玩法矯衆自矜其何以克當哉因立數條端為本職龜鑑庶後繼者亦得依而行之而無虞敗事云行事要公正寬和毋恃職過威以凌衆凡事照顧堂規毋自己懶散嬉戲以導衆凡事可以權變隨宜者毋死執堂衆存心不等當善為調度約束之毋致互相怨諍或有衆小犯於我者毋故懷忿藏私必革其單而後已除大事議稟處置堂衆有病須照顧堂衆告假出入宜審實結制須整肅堂規毋縱衆懶散各處間談并看閲文書等堂衆行事具載堂規有小可初犯者面囑之不用白衆有屢犯堂規動衆者當稟白方丈處置不得苟留有犯堂規動衆者當會議舉出聽板首理斷如板首闕職則自己隨輕重量情罰之凡舉衆聽板首理斷先已議定毋臨時執意互相亢凌於板首書記等須體諒相尊同心協力為貴毋恃職藏私以致大小不平者凡事要同板首副悅商量毋縱意而行以致失睦堂外頭首執事各各相通毋自別戶分門妄生彼此堂內香燈侍者宜體悉善用之毋恃職欺凌以致輕心告退凡方丈所囑大小事務行之果否當回覆凡遇年節朔望請住持上堂先於日前下午開小靜後令侍者各寮白諸頭首聚會同上方丈及住持出知事上香畢齊展拜白云明日某節某旦請和尚上堂次早再請亦如之但不必白也如係施主設齊知客各處送禮說明諸頭首自隨時應候至明日再請恐或有事忙地隔不聞開小靜者須令侍者到寮白之為當住持登座舉讚白椎自有定例毋越次期內初逢十日上午開小靜後令侍者各寮白諸頭首請住持當晚小參已後亦然除住持回覆免請者凡遇齊茶當領衆同諸頭首向住持作禮三拜然後歸位凡遇十四三十晚課誦畢當領衆禮拜方丈朔望之辰舉讚祝白照依舊例毋越新逆衆朔望雲集時唱名三拜當依次毋得混亂如某執事闕職亦須唱過不可失也朔望雲集畢當領衆禮方丈各處巡寮如寺廣事煩難以周遍則散期時不巡寮亦可各事輪牌板首不在其數如輪流堂衆照依名次毋偏重除病告假者早晚課誦勿失並二時齊粥赴堂除有事別論定香宜隨時酌量單薦要及時普衆處置如四月十月之間打晒增減是也單帳有破壞者預白庫司置辦然後請衆收葺供儀收積以公衆用堂衆名數及出入告假當上板記定以便查考有事不得隨衆當令副悅知之如係公務隔日者宜白衆告假凡遇剃頭日期於上午開小靜後令侍者先請板首然後照位次輪流毋混亂凡遇浴期諸頭首浴畢然後照班輪出毋混亂凡衆進堂及失板等當令侍者引禮方丈各處巡寮如齊粥二時失板就本堂問訊住持入堂宜肅衆尊客入堂當出位立西邊相見作揖以存大體堂內所有物件如係香燈侍者照管者當囑之毋致損失退職日或有物件及供儀等當簡點分明交與副悅衆代管已上數條當職者各宜臨事覺察攙先行之毋待方丈口囑可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立副寺須知古規曰庫頭今諸寺稱匱頭北方稱財帛其實皆此一職蓋副二都監寺分勞也副寺之職貴乎出納公平若夫儲畜常住減尅衆僧則非所以護衆矣因立數條端為本寮龜鑑庶後來登職者亦得依而行之而無虞敗事云掌常住錢銀出入切記隨時上曆至每月十四三十晚令庫子預備椅桌茶果請方丈及頭首到寮結算每日用出若干收入若干除用外實存庫若干算畢書記登簿僉單或方丈不出乃同監寺知客呈方丈至一年終又總結算每月用出若干收入若干除用外實存庫若干算畢登簿繳單亦如之外有米麥布帛五味等出入亦當記隨時上曆以便考算庫內錢銀布帛米穀等日夜要關心繫念以防有失也倉庫踈漏鼠侵耗米麥蒸潤一切物色頓放守護有不如法者並須及時處置庫內要多發銀兩買辦當會議監寺或知客稟白方丈方丈所囑大小事務行之果否當回覆各寮執事巨細相通不得別戶分門妄生彼此處衆要寬和不得恃職亢上凌下二時齊粥赴堂不得狥私背衆除有事上下庫子須與監寺知客商量擇有心力能權變守己廉謹者為之管待庫子凡事要公正商量不可結怨狥私擅為革退凡常住財物雖毫末錙銖十方衆僧有分如非寺門外護官員檀越賓客迎送慶吊合行人事者並不可假名支破侵漁什物動用期乎節儉公平不得輕與濫費虧損常住凡事以護惜常住為心而又不可過執尅減大衆甚至重入輕出致外議不平者常住果品不得狥私鬻衆果品鬻衆亦人情方便耳但待客之需期以足用為最且亦貿易事煩未免有多寡貴賤之誚不如除之尤善病僧合用供給之物有即及時應付毋得苦難首座西堂寮合用茶果供給者當令庫子辦送凡有常例合用茶果者取即應之并戒期內所用茶果亦如例常住犒勞執事令庫子同知隨鋪排食物照管凡衆為化主公幹出山者所有䞋儀當預分留之朝暮出入當令庫子看守如無人在庫不宜輕出庫內缺少蔬果油鹽糖豆器具雜物等當預先置辦毋致臨時乏用家常日用糟醬米醋豆油等當及時請熟諳者相幫制辦庫內果品如糕餅等所應自製者隨時置辦庫內待客小菜合用香椒五味者令庫子精製遇齊供時令庫子安排佛前果品及住持位等一如舊例或施主欲豐厚美觀者宜添設之施主設齊備供儀憑堂內侍者賫入厚薄照如常例或施主另意添設者別論施主設齊散䞋如知客事忙宜代理又散䞋有平等雙分不一者隨時酌量施主某日設齊雖知客預先引到而齊事亦當與知客商之凡遇年節朔望之辰及請住持上堂時令庫子方丈排設香燭一如舊例如庫房遠離方丈即知客遣行者理之亦得不必拘執相推可也監院有事別出如遇年節朔望請住持上堂及朔望佛前舉香常住齊供時舉香皆當代職監院有事別出如遇常住齊茶當與知客拜請方丈歲例分飯齊應及時料理并請定明年收飯者監院闕職及有事別出等如田莊稅契出入迎送慶吊差撥各處要緊事務當會議知客共職之庫內所有器用什物當置簿記定以便查考大小諸寮所有器用什物當置總簿記定以便查考退職日須請諸頭首結算簿書將錢銀布帛米穀一切器用食物等逐件簡點分明交與新副寺掌管毋得混亂已上數條當職者各宜臨事覺察攙先行之毋待方丈頻為口囑可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立典座須知處稠林而立德莫大乎利養以資生是故膺雲厨之任者能調和衆口而百福俱全焉若夫六味不精三德不給則非二時所以奉衆矣因立數條端為本寮龜鑑庶後來領職者亦得依而行之而無成過咎云凡所有供養務在物料精潔五味調和生熟合宜毋得忽略動衆念佛前各處齊供務在隨豐儉齊整安排不得參差目為故事尊客到山調理菜蔬務要加勤覺察如尋常客情則隨分鋪設不妨預備客菜以防不時忽到者凡有殘蔬餘供可以普衆者宜發出毋藏蓄過時以致腐壞重務行衆早晚合用菜蔬者當善為調和毋使致怨各衆冒犯寒暑求取釅辣湯者代為之各衆無事濫索菜蔬者不得輕與油醬五味等宜收置厨房不得憑衆私取濫用以護惜常住為心不得匿取菜蔬私造飲食及陪奉人情等二時厨下粥飯所食不可異衆淨潔鍋灶及謹慎火燭等自前段至此貼案通知各寮執事巨細相通不得別戶分門妄生彼此處衆貴寬和不得恃職亢上凌下同貼案貴有商量毋硬執己意互相怨諍以勞逸必均為念毋恃職自暇其身施主作齊所有發麵錢銀當隨多寡照位輕重分之如收銀一錢已得其五貼案得其三火頭得其二是也或有過勞略為增減者自己隨時酌量五更報鐘鳴預及時起身以俟應板如有失者晚當入堂各處問訊二時過堂板須緩急合度凡遇公事宜隨衆除事繁弗論本寮所有常住什物宜私自登簿以便查考退職日將本寮所有什物照簿簡點分明交與新典座掌管毋得混亂已上數條當職者各宜臨事覺察行之可也或有欵數不周惟冀隨時體諒此諭某年某月某日本山住持某立直歲須知職掌一切作務名曰直歲當其任者貴乎公勤辦事以勞逸必均為念若夫寮舍不修什物不備安衆之道失矣因立數條端為本寮龜鑑庶後來受職者亦得依而行之而無虞敗事云凡殿堂寮舍之損漏戶牖墻壩之崩圮須及時白方丈打點工衆整葺毋挨延過日貽纍後人常住有土木雜作之役當統率衆工朝暮照管計每日工程若干該銀若干支出銀若干私自登簿以便結算如係大修造事體甚煩即當議稟方丈添人共掌之每夜至開小靜後到庫房同監院知客營辦議行明日之事重務工衆合用茶果麵食犒勞者當及時預知同庫司知客商議大小匠工有不勤作者當黜其游惰毋縱浮食蠧財害公田園播植收種須及時催趲司田園者田園莊舍碾磨碓坊頭匹舟車俱要應時修葺火燭盜賊亦宜巡護防警鋤鋸刀斧簑笠杠繩所用雜物等須安放司什房內令司什照管有破損朽壞者分付及時收理司什房內所有動用什物當閲其數令司什逐項登記以便查考司什房內動用什物缺缺應買者當白庫司置辦船隻出入須照管搬貨及囑付看守者收繫放水旱二時防護等凡方丈所囑大小事務行之果否當回覆各寮執事巨細相通不得別戶分門妄生彼此不得專學己業廢弛公事互相推託致同寮不平者處衆貴寬和不得恃職亢上凌下或有衆干犯於我者當念彼之辛劬毋得懷忿藏私必革其職而後已差撥使令所有賞罰要得其當毋用阿狥致怨上下當日普請預先掛牌旁書云某處某事至衆粥飯畢乃敲長梆立號有不赴者合行各處催趲作務出坡夏冬化柴要堂內輪數衆當白維那客堂輪數衆當白堂主不得擅自差撥其餘大小寮舍則照位輪之普請出坡當以身先之不得躲懶背衆除事煩弗論凡僧病革須先備辦柴薪逮瞑目時預告雜務收設龕位靈桌及齊供茶果香紙等將亡僧所有隨身行李同知客簡點安放常住空處仍差撥行衆打點水火及擡龕等復掛送亡牌俟大衆粥罷念誦送出到茶毗所住持立定乃問訊度火炬候舉佛事次日引喪主持磁器收骨盛貯封定安置諸隱處以便入塔估唱亡僧物件須同兩序執事主之送亡估唱二事百丈清規載之甚詳但恐過煩難以悉舉姑就今時所通行者録其大槩以便權宜云爾本寮所有常住什物宜私自登簿以便查考清明祭掃祖塔住持塔及普同塔等預令雜務剗草掃淨壇所並開壙收置亡僧靈骨或石崩灰拆依時整葺毋致荒壞退職日將本寮司什寮所有家火物件照簿簡點分明交與新直歲掌管毋得混亂已上數條當職者各宜臨事覺察攙先行之毋待方丈頻為口囑可也或有欵數不周惟冀隨時體諒此諭崇禎己卯年春月日本山住持某立
